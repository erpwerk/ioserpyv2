name: Build & Test Backend (ERPY V2)

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        working-directory: backend
        run: |
          go mod init github.com/erpwerk/erpy-v2/backend || true
          go get github.com/gofiber/fiber/v2
          go get github.com/joho/godotenv
          go build -v -o erpy-backend .

