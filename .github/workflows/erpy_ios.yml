name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate --spec ios-app/project.yml

      - name: Resize App Icon
        run: sips -z 1024 1024 ios-app/Sources/Assets.xcassets/AppIcon.appiconset/icon.png

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project ios-app/AgentWrapper.xcodeproj \
            -scheme AgentWrapper \
            -configuration Release \
            -archivePath AgentWrapper.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_METHOD=manual

      - name: Create Payload and IPA
        run: |
          mkdir -p Payload
          cp -r AgentWrapper.xcarchive/Products/Applications/AgentWrapper.app Payload/
          zip -r AgentWrapper.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentWrapper-IPA
          path: AgentWrapper.ipa
